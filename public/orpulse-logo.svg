<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orpulse-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulse-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#orpulse-gradient)" stroke-width="3"/>
  
  <!-- Letter 'R' -->
  <g stroke="url(#orpulse-gradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left vertical line of R -->
    <path d="M 20 44 L 20 20"/>
    
    <!-- Top horizontal and curve of R -->
    <path d="M 20 20 L 36 20 L 40 24 L 40 28 L 36 32 L 20 32"/>
    
    <!-- Diagonal leg of R with pulse -->
    <path d="M 28 32 L 30 32 L 32 28 L 34 40 L 36 32 L 38 32 L 40 36 L 42 44"/>
  </g>
</svg>