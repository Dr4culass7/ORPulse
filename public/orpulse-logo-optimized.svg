<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logo-gradient)" stroke-width="4"/>
  
  <!-- Letter 'R' -->
  <g stroke="url(#logo-gradient)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left vertical line of R -->
    <path d="M 25 75 L 25 25"/>
    
    <!-- Top horizontal and curve of R -->
    <path d="M 25 25 L 55 25 L 65 35 L 65 45 L 55 55 L 25 55"/>
    
    <!-- Diagonal leg of R -->
    <path d="M 45 55 L 65 75"/>
  </g>
  
  <!-- EKG pulse line across the R -->
  <path d="M 15 50 L 25 50 L 30 40 L 35 60 L 40 30 L 45 70 L 50 50 L 55 50 L 60 45 L 65 55 L 70 50 L 85 50" 
        stroke="url(#logo-gradient)" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>